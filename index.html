                    </div>
                    <div class="header__right-side">
                        <button class="header__btn-search">
                            <img src="icons/burger-search.svg" class="header__icon icon" alt="Кнопка поиска">
                        </button>
                    </div>
                </header>
                <main class="main main__container">
                    <nav class="nav">
                        <ul class="nav__items">
                            <li class="nav__item">
                                <a href="#" class="nav__link">
                                    Ремонт техники
                                </a>
                            </li>
                            <li class="nav__item">
                                <a href="#" class="nav__link">
                                    Услуги и сервисы
                                </a>
                            </li>
                            <li class="nav__item">
                                <a href="#" class="nav__link">
                                    Корпоративным клиентам

                            </li>
                            <li class="nav__item">
                                <a href="#" class="nav__link">

                            </li>
                            <li class="nav__item">
                                <a href="#" class="nav__link">
                                    Партнерам
                                </a>
                            </li>
                            <li class="nav__item">
                                <a href="#" class="nav__link">
                                    Производителям
                                </a>
                            </li>
                            <li class="nav__item">
                                <a href="#" class="nav__link">
                                    Наши сервисные центры
                                </a>
                            </li>
                            <li class="nav__item">
                                <a href="#" class="nav__link">
                                    Контакты
                                </a>
                            </li>
                        </ul>
                    </nav>
                </main>
                <footer class="footer footer__container">
                    <div class="footer__feedback">
                        <div class="forms">
                            <button class="forms__call">
                                <img class="forms__icon icon" src="icons/call-icon.svg" alt="Звонок">
                            </button>
                            <button class="forms__chat">
                                <img class="forms__icon icon" src="icons/chat_icon.svg" alt="Чат">
                            </button>
                            <button class="forms__profile">
                                <img class="forms__icon icon" src="icons/profile_icon.svg" alt="Профиль">
                            </button>
                        </div>
                        <a class="footer__mail" href="mailto:mail@cps.com">
                            mail@cps.com
                        </a>
                        <a class="footer__tel" href="tel:+78008908900">

                        </a>
                    </div>
                    <div class="footer__language language">
                        <button class="language__item">RU</button>
                        <button class="language__item">EN</button>

                    </div>
                </footer>
